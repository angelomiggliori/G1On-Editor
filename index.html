<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>G1on Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/main.css"/>
<style>
.si{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.6rem;padding:2px 8px;border-radius:10px;margin-left:4px}
.si.saved{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.si.saving{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.si.dirty{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.ptag.share{background:rgba(6,182,212,.15);color:var(--accent3)}
.backup-count{font-size:.55rem;background:rgba(124,58,237,.3);padding:1px 5px;border-radius:8px;margin-left:2px}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot off" id="dot"></div>G1ON</div>
  <span id="badge">no device</span>
  <div id="save-dot" title="Alterações não salvas"></div>
  <span id="status" class="s-info">ready</span>
</header>
<div class="toolbar">
  <button class="btn" id="bc">CONNECT</button>
  <button class="btn" id="br" disabled>READ ALL</button>
  <button class="btn" id="bb" disabled>BACKUP</button>
  <button class="btn" id="brs" disabled>RESTORE</button>
  <input type="file" id="frs" accept=".json" style="display:none"/>
  <span style="width:1px;height:20px;background:var(--border2);margin:0 2px;flex-shrink:0"></span>
  <button class="btn" id="bexp" title="Exportar patch atual como JSON" style="color:var(--accent3);border-color:rgba(6,182,212,.3)">EXPORT</button>
  <button class="btn" id="bimp" title="Importar patch de arquivo JSON">IMPORT</button>
  <input type="file" id="fimp" accept=".json,.tls" style="display:none"/>
  <button class="btn" id="bshare" title="Gerar link compartilhável do patch atual" style="color:var(--accent3);border-color:rgba(6,182,212,.3)">SHARE</button>
  <span style="width:1px;height:20px;background:var(--border2);margin:0 2px;flex-shrink:0"></span>
  <button class="btn" id="bkp" style="color:var(--accent2);border-color:rgba(124,58,237,.3)">BACKUPS <span id="backup-count" class="backup-count"></span></button>
  <div class="pw"><div class="pt"><div class="pf" id="pb"></div></div><span id="pt"></span></div>
  <button class="btn" id="bd">DEBUG</button>
</div>
<div id="sidebar">
  <div class="sh">
    PATCHES
    <span id="sh-hint" style="float:right;font-size:.55rem;opacity:.4;font-weight:normal;letter-spacing:0">arraste para trocar</span>
  </div>
  <div id="pl"></div>
</div>
<div id="main">
  <div class="es" id="es">
    <div class="ei">⬡</div>
    <p>CONNECT YOUR ZOOM PEDAL VIA USB</p>
    <p style="font-size:.65rem;opacity:.5">chrome ou edge · permitir MIDI quando solicitado</p>
  </div>
  <div id="ec" style="display:none"></div>
</div>
<div id="dbg">
  <div class="dh">
    <span class="dt">◈ MIDI RAW LOG</span>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="ds" style="cursor:pointer;color:var(--accent3)">SEND IDENTITY REQ</span>
      <span id="dc" style="cursor:pointer;color:var(--text3)">✕</span>
    </div>
  </div>
  <div id="dl"></div>
</div>
<!-- 0. Console de log global -->
<script src="js/console.js"></script>
<!-- 1. Storage (IndexedDB + localStorage) -->
<script src="js/storage.js"></script>
<!-- 2. Dados de efeitos (FX_BY_KEY + FX_DB + FX_DFLT) -->
<script src="data/fx_data.js"></script>
<!-- 3. Motor MIDI/Zoom (codec, protocolo) -->
<script src="js/engine.js"></script>
<!-- 4. Aplicação (UI, editor, backup) -->
<script src="js/app.js"></script>
</body>
</html>
