<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>G1on Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<style>
/* storage indicator */
.si{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.6rem;padding:2px 8px;border-radius:10px;margin-left:4px}
.si.saved{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.25)}
.si.saving{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.si.dirty{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.ptag.share{background:rgba(6,182,212,.15);color:var(--accent3)}</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot off" id="dot"></div>G1ON</div>
  <span id="badge">no device</span>
  <span id="status" class="s-info">ready</span>
</header>
<div class="toolbar">
  <button class="btn" id="bc">CONNECT</button>
  <button class="btn" id="br" disabled>READ ALL</button>
  <button class="btn" id="bb" disabled>BACKUP</button>
  <button class="btn" id="brs" disabled>RESTORE</button>
  <input type="file" id="frs" accept=".json" style="display:none"/>
  <div class="pw"><div class="pt"><div class="pf" id="pb"></div></div><span id="pt"></span></div>
  <span style="width:1px;height:20px;background:var(--border2);margin:0 4px"></span>
  <button class="btn" id="bexp" title="Exportar patch atual como JSON">EXPORT</button>
  <button class="btn" id="bimp" title="Importar patch de arquivo JSON">IMPORT</button>
  <button class="btn" id="bshare" title="Gerar link compartilhável do patch atual" style="color:var(--accent3);border-color:rgba(6,182,212,.3)">SHARE</button>
  <button class="btn" id="bbkm" title="Gerenciar backups locais" style="color:var(--accent2);border-color:rgba(124,58,237,.3)">BACKUPS</button>
  <button class="btn" id="bd">DEBUG</button>
</div>
<div id="sidebar"><div class="sh">PATCHES</div><div id="pl"></div></div>
<div id="main">
  <div class="es" id="es">
    <div class="ei">⬡</div>
    <p>CONNECT YOUR ZOOM PEDAL VIA USB</p>
    <p style="font-size:.65rem;opacity:.5">chrome or edge · allow midi when prompted</p>
  </div>
  <div id="ec" style="display:none"></div>
</div>
<div id="dbg">
  <div class="dh">
    <span class="dt">◈ MIDI RAW LOG</span>
    <div style="display:flex;gap:12px;align-items:center">
      <span id="ds" style="cursor:pointer;color:var(--accent3)">SEND IDENTITY REQ</span>
      <span id="dc" style="cursor:pointer;color:var(--text3)">✕</span>
    </div>
  </div>
  <div id="dl"></div>
</div>
<script src="js/engine.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
